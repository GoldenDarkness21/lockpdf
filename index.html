<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador PDF Seguro - Supabase</title>
    <meta name="theme-color" content="#ffffff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="stylesheet" href="viewer.css">
    <!-- PDF.js via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
    <!-- Contenedor principal -->
    <div class="app-container">
        <!-- Header con controles -->
        <header class="app-header">
            <div class="header-left">
                <h1>Fintech | Radar Trimestral (Q1-2026)</h1>
                <div class="status-indicator" id="statusIndicator">
                    <span class="status-dot"></span>
                    <span class="status-text">Cargando...</span>
                </div>
            </div>
            <div class="header-controls">
                <!-- 2. Limpieza de Interfaz: Elimina por completo el HTML y el JS de los botones 'Anterior', 'Siguiente' y el contador de páginas 'X de Y' de la parte superior -->
                <!-- Deja únicamente los botones de + y - para el zoom -->
            </div>
        </header>

        <!-- Contenedor del visor -->
        <div class="viewer-container">
            <!-- Contenedor de scroll para el PDF -->
            <div class="pdf-scroll-container">
                <!-- Canvas para renderizar el PDF -->
                <div class="canvas-wrapper">
                    <canvas id="pdfCanvas"></canvas>
                    <!-- Overlay de seguridad para bloquear selección y arrastre -->
                    <div class="security-overlay" id="securityOverlay"></div>
                </div>
            </div>
            
            <!-- Spinner de carga -->
            <div class="loading-spinner" id="loadingSpinner">
                <div class="spinner"></div>
                <p>Cargando documento...</p>
            </div>
        </div>

        <!-- Footer con controles de zoom y navegación -->
        <footer class="app-footer">
            <div class="controls-group">
                <!-- Botones de zoom, navegación y pantalla completa juntos -->
                <div class="zoom-controls">
                    <button class="fullscreen-btn" id="fullscreenBtn" title="Pantalla Completa">
                        🖥️
                    </button>
                    <span class="controls-separator"></span>
                    <button class="zoom-btn" id="zoomOutBtn" title="Alejar">
                        -
                    </button>
                    <button class="zoom-btn" id="zoomInBtn" title="Acercar">
                        +
                    </button>
                    <span class="controls-separator"></span>
                    <button class="nav-btn" id="prevPageBtnBottom" title="Página Anterior">
                        ←
                    </button>
                    <button class="nav-btn" id="nextPageBtnBottom" title="Página Siguiente">
                        →
                    </button>
                </div>
            </div>
        </footer>
    </div>

    <!-- Scripts -->
    <script>
        // Configuración global de PDF.js
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    <script src="app.js"></script>
    
</body>
</html>
